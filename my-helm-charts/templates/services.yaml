# 1. The Active Service (Live Traffic)
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-active
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.global.appLabel }}
  ports:
    - port: 80
      targetPort: 5000
---
# 2. The Preview Service (Testing Traffic)
apiVersion: v1
kind: Service
metadata:
  name: bluegreen-preview
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.global.appLabel }}
  ports:
    - port: 80
      targetPort: 5000
