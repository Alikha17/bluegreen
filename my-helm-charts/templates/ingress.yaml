apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ingress
  namespace: default
  annotations:
  alb.ingress.kubernetes.io/group.name: "chippy-shared-lb"
  alb.ingress.kubernetes.io/scheme: internet-facing
  alb.ingress.kubernetes.io/target-type: ip
  alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
  alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:113461832962:certificate/60d2857a-1d9a-486d-b943-04d8586e170d
  # If your app doesn't have an SSL cert inside the container, use HTTP here
  alb.ingress.kubernetes.io/backend-protocol: HTTP
  alb.ingress.kubernetes.io/success-codes: "200-399"
  alb.ingress.kubernetes.io/healthcheck-port: "80"
spec:
  ingressClassName: alb
  rules:
    - host: chippy123.shop
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: bluegreen-active # Points to your Blue-Green app
                port:
                  number: 80
