apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: bluegreen-app
  namespace: default
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.global.appLabel }}
  template:
    metadata:
      labels:
        app: {{ .Values.global.appLabel }}
    spec:
      containers:
      - name: flask-app
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        env:
          - name: APP_VERSION
            value: "2.0.0"
          - name: APP_COLOR
            value: "green"
        ports:
        - containerPort: {{ .Values.service.targetPort }}
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
  strategy:
    blueGreen:
      activeService: bluegreen-active
      previewService: bluegreen-preview
      autoPromotionEnabled: false
