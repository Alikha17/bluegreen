apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ include "my-helm-charts.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: {{ .Values.global.appLabel }}
  template:
    metadata:
      labels:
        app: {{ .Values.global.appLabel }}
    spec:
      containers:
      - name: {{ .Chart.Name }}
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - containerPort: 5000 # Matches Flask Logs
          name: http
        volumeMounts:
        - name: storage-volume
          mountPath: {{ .Values.persistence.mountPath }}
      volumes:
      - name: storage-volume
        persistentVolumeClaim:
          claimName: bluegreen-my-helm-charts-ebs-pvc
  strategy:
    blueGreen:
      activeService: bluegreen-active
      previewService: bluegreen-preview
      autoPromotionEnabled: false
