# 1. Global App Settings
replicaCount: 2

image:
  repository: 113461832962.dkr.ecr.ap-south-1.amazonaws.com/bluegreenrepo
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

# 2. Service Settings (for routing)
service:
  type: ClusterIP
  port: 80

# 3. Ingress Settings (Updated for chippy123.shop)
ingress:
  enabled: true
  className: "alb"
  annotations:
    # This MUST match the group name in your ArgoCD ingress later
    alb.ingress.kubernetes.io/group.name: "chippy-prod-alb"
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    # Replace with your actual ACM ARN
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:ap-south-1:113461832962:certificate/60d2857a-1d9a-486d-b943-04d8586e170d"
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: '443'
  hosts:
    - host: chippy123.shop
      paths:
        - path: /
          pathType: Prefix

# 5. Service Account Settings
serviceAccount:
  create: true
  annotations: {}
  name: ""

# 6. Gateway API (Fixes httproute.yaml / NOTES.txt errors)
httpRoute:
  enabled: false

# 7. Resources & Security (Best practices)
resources: {}
autoscaling:
  enabled: false

persistence:
  enabled: true
  mountPath: /data
  storageClass: ebs-sc
  size: 1Gi
