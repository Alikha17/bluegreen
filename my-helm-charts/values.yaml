# 1. Global App Settings
replicaCount: 2

image:
  repository: 113461832962.dkr.ecr.ap-south-1.amazonaws.com/bluegreenrepo
  pullPolicy: IfNotPresent
  tag: "latest"

nameOverride: ""
fullnameOverride: ""

# 2. Service Settings (for routing)
service:
  type: ClusterIP
  port: 80

# 3. Ingress Settings (Fixes the ingress.yaml error)
ingress:
  enabled: true
  className: "alb"
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific

# 4. Storage Settings (Fixes pvc.yaml / storageclass.yaml errors)
persistence:
  enabled: true
  storageClass: "gp2"
  accessMode: ReadWriteOnce
  size: 8Gi

# 5. Service Account Settings
serviceAccount:
  create: true
  annotations: {}
  name: ""

# 6. Gateway API (Fixes httproute.yaml / NOTES.txt errors)
httpRoute:
  enabled: false

# 7. Resources & Security (Best practices)
resources: {}
autoscaling:
  enabled: false
