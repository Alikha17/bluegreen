name: Build and Push to ECR

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write
  contents: write  # Changed to write to allow the tag update

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::113461832962:role/blue-green
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, Tag, and Push
        id: build-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: bluegreenrepo
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Update Helm Chart Tag
        run: |
          # Updates the tag in values.yaml to the unique GitHub SHA
          sed -i "s/tag: .*/tag: \"${{ github.sha }}\"/" my-helm-charts/values.yaml
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add my-helm-charts/values.yaml
          git commit -m "Update image tag to ${{ github.sha }} [skip ci]"
          git push
